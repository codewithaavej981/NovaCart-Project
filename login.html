<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novakart Login</title>
   <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container">

        <div class="left-panel">
            <h1>NovaKart</h1>
            <p>Welcome Back! Login to access your cart, orders and wishlist.</p>

            <ul>
                <li>🛒 Easy Shopping</li>
                <li>📦 Order Tracking</li>
                <li>❤️ Wishlist Management</li>
                <li>🔥 Daily Offers</li>
            </ul>
        </div>

        <div class="right-panel">
            <h2>Login to Your Account</h2>

            <form action="index.html">
                <input type="text" placeholder="Email or Mobile Number" required>

                <input type="password" placeholder="Password" required>

                <div class="options">
                    <label>
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

                <p class="signup">
                     New User? <a href="signup.html">Create Account</a>
                </p>
            </form>
        </div>

    </div>

</body>
</html>
